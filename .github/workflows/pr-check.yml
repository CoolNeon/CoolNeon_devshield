name: PR Check

on:
  pull_request:

jobs:
  check-version:
    name: Unreleased version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from library.properties
        id: props
        run: |
          VERSION=$(grep -m1 '^version=' library.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.props.outputs.version }}"
          if gh release view "${VERSION}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::warning file=library.properties::Version ${VERSION} already exists as a release. Remember to bump the version if the intent is to publish a new release."
          else
            echo "Version ${VERSION} is not yet released. OK."
          fi

  arduino-lint:
    name: Arduino Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: arduino/arduino-lint-action@v2
        with:
          project-type: library
          library-manager: update
          compliance: specification
